      <stop stop-color="#E8F3FF"/>
      <stop offset="0.5" stop-color="#F7FBFF"/>
      <stop offset="1" stop-color="#EFF9F0"/>
    </linearGradient>
    <linearGradient id="accent" x1="210" y1="128" x2="520" y2="520" gradientUnits="userSpaceOnUse">
