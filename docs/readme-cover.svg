  <text x="254" y="543" fill="#4D5E73" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="18" font-weight="500">Bundled Ghostscript runtime · Drag-and-drop upload · Draggable file drawer · Safe output naming</text>
